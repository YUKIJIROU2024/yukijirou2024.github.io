<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>社労士 | Knowledge Base</title>
  <style>
    :root {
      --blue-dark: #1f4e79;
      --blue: #3a7bd5;
      --bg: #f0f4f9;
      --border: #d0dcea;
      --muted: #5a6a80;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Meiryo", sans-serif;
      background: var(--bg);
      color: #1a1a2e;
      line-height: 1.6;
    }
    header {
      background: linear-gradient(135deg, var(--blue-dark), var(--blue));
      color: white;
      padding: 40px 20px 32px;
      text-align: center;
    }
    header h1 { font-size: clamp(1.4rem, 3vw, 2rem); }
    header p { margin-top: 6px; opacity: .8; font-size: .9rem; }
    header a {
      display: inline-block;
      margin-top: 14px;
      font-size: .82rem;
      color: rgba(255,255,255,.75);
      text-decoration: none;
      border: 1px solid rgba(255,255,255,.4);
      padding: 4px 14px;
      border-radius: 999px;
      transition: background .15s;
    }
    header a:hover { background: rgba(255,255,255,.15); }
    main {
      max-width: 860px;
      margin: 32px auto;
      padding: 0 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }
    .card {
      display: block;
      text-decoration: none;
      background: white;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      color: #1a1a2e;
      transition: transform .18s ease, box-shadow .18s ease;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,.1); }
    .card-name { font-weight: 700; font-size: 1rem; margin-bottom: 6px; }
    .card-desc { font-size: .83rem; color: var(--muted); line-height: 1.5; }
    footer {
      text-align: center;
      padding: 28px 20px;
      color: var(--muted);
      font-size: .82rem;
    }
  </style>
</head>
<body>

<header>

<main>

    </a>

    <a class="card" href="1年単位の変形労働時間制.html">
      <div class="card-name">1年単位の変形労働時間制</div>
      <div class="card-desc">変形労働時間制の基本ルール（1年単位）</div>
    </a>

    <a class="card" href="雇用保険法「育児休業等給付」.html">
      <div class="card-name">雇用保険法「育児休業等給付」</div>
      <div class="card-desc">育児休業給付金の要件・給付内容</div>
    </a>

    <a class="card" href="妊産婦等 × 育児休業.html">
      <div class="card-name">妊産婦等 × 育児休業</div>
      <div class="card-desc">妊産婦に関する労働基準・育児休業の整理</div>
    </a>

    <a class="card" href="両立支援等助成金.html">
      <div class="card-name">両立支援等助成金</div>
      <div class="card-desc">仕事と家庭の両立を支援する助成金まとめ</div>
    </a>

    <a class="card" href="療養に関する保険給付以外の保険給付.html">
      <div class="card-name">療養以外の保険給付</div>
      <div class="card-desc">傷病手当金・出産手当金など療養以外の給付</div>
    </a>

    <a class="card" href="遺族厚生年金.html">
      <div class="card-name">遺族厚生年金</div>
      <div class="card-desc">遺族厚生年金の受給要件・給付内容</div>
    </a>

  </div>
</main>

<footer>© 2026 Yukiji AI Lab</footer>

</body>
</html>
